<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日更獎勵 - The Garden</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            yellow: '#f59e0b',
                            red: '#ef4444',
                            purple: '#a855f7'
                        }
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen selection:bg-brand-purple selection:text-white">

    <!-- Mobile-First Container -->
    <div id="app-container" x-data="appData()" class="w-full max-w-md bg-brand-dark h-[100dvh] md:h-[850px] md:max-h-[100dvh] md:rounded-[3rem] md:border-[8px] border-black shadow-2xl relative overflow-hidden flex flex-col text-slate-100">
        
        <!-- Header (Safe Area Top) -->
        <header class="pt-12 pb-4 px-6 flex justify-between items-center z-20 bg-gradient-to-b from-brand-dark/90 to-transparent backdrop-blur-sm">
            <h1 class="text-2xl font-bold tracking-wide" x-text="getPageTitle()"></h1>
            <div class="flex items-center gap-3 bg-white/10 px-3 py-1.5 rounded-full backdrop-blur-md">
                <i class="fa-solid fa-seedling text-brand-yellow drop-shadow-[0_0_8px_rgba(245,158,11,0.8)]"></i>
                <span class="font-semibold text-sm" x-text="user.yellow_flowers"></span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto pb-24 px-6 relative z-10 scrollbar-hide">
            
            <!-- Tab: Home (The Garden) -->
            <template x-if="currentTab === 'home'">
                <div class="h-full flex flex-col items-center justify-center relative">
                    <!-- Flower Visuals Container -->
                    <div id="garden-canvas" class="absolute inset-0 pointer-events-none opacity-50">
                        <!-- Flowers will be injected here via JS -->
                    </div>
                    
                    <!-- Claim State -->
                    <template x-if="!user.has_claimed_daily">
                        <div class="z-20 text-center animate-fade-in cursor-pointer group mt-20" @click="claimDailyFlowers()">
                            <div class="text-white/90 text-sm tracking-widest mb-6 font-bold bg-black/40 inline-block px-4 py-1.5 rounded-full backdrop-blur-sm border border-white/10">點擊收取今日花束</div>
                            
                            <!-- Three Bouquets -->
                            <div class="flex justify-center items-end gap-1 mb-10">
                                <div class="text-6xl text-brand-yellow drop-shadow-[0_0_15px_rgba(245,158,11,0.8)] -rotate-12 transition-transform duration-300 group-hover:scale-110 group-active:scale-95"><i class="fa-solid fa-seedling"></i></div>
                                <div class="text-7xl text-brand-yellow drop-shadow-[0_0_20px_rgba(245,158,11,0.9)] z-10 transition-transform duration-300 group-hover:scale-110 group-active:scale-95 pb-2"><i class="fa-solid fa-seedling"></i></div>
                                <div class="text-6xl text-brand-yellow drop-shadow-[0_0_15px_rgba(245,158,11,0.8)] rotate-12 transition-transform duration-300 group-hover:scale-110 group-active:scale-95"><i class="fa-solid fa-seedling"></i></div>
                            </div>
                            
                            <div class="bg-gradient-to-r from-brand-yellow to-orange-400 text-slate-900 font-bold px-10 py-4 rounded-full shadow-[0_0_15px_rgba(245,158,11,0.4)] transform transition active:scale-95 group-hover:shadow-[0_0_25px_rgba(245,158,11,0.6)] text-lg">
                                收取 3 朵黃橘花
                            </div>
                        </div>
                    </template>

                    <!-- Already Claimed State -->
                    <template x-if="user.has_claimed_daily">
                        <div class="z-10 text-center mt-32 space-y-6 animate-fade-in">
                            <div class="glass-panel p-6 rounded-3xl inline-block shadow-lg border border-white/10 bg-white/5 backdrop-blur-md">
                                <h2 class="text-white/70 text-sm uppercase tracking-widest mb-2">你的精神花園</h2>
                                <div class="flex gap-6 justify-center">
                                    <div class="text-center">
                                        <div class="text-4xl text-brand-red drop-shadow-[0_0_12px_rgba(239,68,68,0.8)] mb-1"><i class="fa-solid fa-fan fa-spin-pulse" style="--fa-animation-duration: 4s;"></i></div>
                                        <div class="font-bold text-xl" x-text="user.total_red_flowers"></div>
                                        <div class="text-xs text-white/50">支持紅花</div>
                                    </div>
                                    <div class="text-center">
                                        <div class="text-4xl text-brand-purple drop-shadow-[0_0_12px_rgba(168,85,247,0.8)] mb-1"><i class="fa-solid fa-star fa-beat" style="--fa-animation-duration: 3s;"></i></div>
                                        <div class="font-bold text-xl" x-text="user.total_purple_flowers"></div>
                                        <div class="text-xs text-white/50">達標紫花</div>
                                    </div>
                                </div>
                            </div>

                            <button @click="currentTab = 'quest'" class="w-full bg-gradient-to-r from-brand-purple to-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg transform transition active:scale-95 text-lg">
                                順手更新專案 <i class="fa-solid fa-arrow-right ml-1"></i>
                            </button>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Tab: Quest (Manage/Create) -->
            <template x-if="currentTab === 'quest'">
                <div class="space-y-6 animate-fade-in pb-10">
                    
                    <!-- Daily Check-in Form (Moved to top) -->
                    <template x-if="quest.total_target_days && !hasCheckedInToday()">
                        <div class="space-y-4">
                            <h3 class="font-bold text-lg">今日紀錄</h3>
                            <textarea id="logText" class="w-full bg-black/40 border border-brand-purple/30 rounded-2xl p-4 text-sm focus:outline-none focus:border-brand-purple transition resize-none h-28 placeholder:text-white/30" placeholder="今天有什麼進展或心得？寫下來吧..."></textarea>
                            <button @click="performCheckIn()" class="w-full bg-brand-yellow text-slate-900 font-bold py-4 rounded-2xl shadow-[0_0_15px_rgba(245,158,11,0.4)] transform transition active:scale-95 text-lg flex items-center justify-center gap-2">
                                <i class="fa-solid fa-check-circle"></i> 完成打卡 (+1 橘花)
                            </button>
                        </div>
                    </template>

                    <template x-if="hasCheckedInToday()">
                        <div class="glass-panel text-center py-6 px-4 rounded-3xl border border-brand-yellow/30 bg-gradient-to-br from-brand-yellow/10 to-transparent">
                            <div class="text-3xl text-brand-yellow mb-2"><i class="fa-regular fa-face-smile-beam"></i></div>
                            <p class="font-bold text-brand-yellow">今日已完成紀錄！</p>
                            <p class="text-xs mt-1 text-white/70">去社群把獲得的橘花送給別人吧</p>
                        </div>
                    </template>

                    <!-- Current Quest Status -->
                    <div class="glass-panel p-5 rounded-3xl border border-white/10 bg-white/5 backdrop-blur-md">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-lg" x-text="quest.title || '尚未建立專案'"></h3>
                                <p class="text-sm text-white/60">目標：<span x-text="quest.total_target_days ? quest.total_target_days + ' 天' : '-'"></span></p>
                            </div>
                            <div class="bg-brand-purple/20 text-brand-purple px-3 py-1 rounded-full text-xs font-bold border border-brand-purple/30">
                                進行中
                            </div>
                        </div>
                        
                        <template x-if="quest.total_target_days">
                            <div class="space-y-2">
                                <div class="flex justify-between text-xs">
                                    <span>進度：<span x-text="quest.current_streak"></span>/<span x-text="quest.total_target_days"></span> 天</span>
                                    <span class="text-brand-purple" x-text="Math.round((quest.current_streak/quest.total_target_days)*100) + '%'"></span>
                                </div>
                                <div class="w-full bg-slate-800 rounded-full h-2.5">
                                    <div class="bg-gradient-to-r from-brand-purple to-pink-500 h-2.5 rounded-full transition-all duration-1000" :style="'width: ' + ((quest.current_streak/quest.total_target_days)*100) + '%'"></div>
                                </div>
                            </div>
                        </template>

                        <template x-if="!quest.total_target_days">
                            <button @click="showCreateQuestModal = true" class="w-full mt-4 bg-white/10 hover:bg-white/20 text-white py-3 rounded-xl transition text-sm font-semibold">
                                + 建立新專案
                            </button>
                        </template>
                    </div>
                    
                    <!-- Calendar View -->
                    <template x-if="quest.total_target_days">
                        <div class="glass-panel p-5 rounded-3xl border border-white/10 bg-white/5 backdrop-blur-md">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold text-sm" x-text="currentMonthName"></h3>
                                <div class="flex items-center gap-2 text-[10px] text-white/50">
                                    <div class="w-2 h-2 rounded-full bg-brand-yellow shadow-[0_0_5px_rgba(245,158,11,0.5)]"></div> 已打卡
                                </div>
                            </div>
                            
                            <!-- Weekdays Header -->
                            <div class="grid grid-cols-7 gap-1 text-center text-xs text-white/40 mb-2 font-medium">
                                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                            </div>
                            
                            <!-- Days Grid -->
                            <div class="grid grid-cols-7 gap-1 text-center">
                                <template x-for="(day, index) in calendarDays" :key="index">
                                    <div class="aspect-square flex items-center justify-center rounded-lg text-sm transition-all"
                                         :class="{
                                             'bg-white/5 text-white/30': !day.empty && !day.isLogged && !day.isToday,
                                             'bg-brand-yellow text-slate-900 font-bold shadow-[0_0_8px_rgba(245,158,11,0.4)] scale-105 z-10': !day.empty && day.isLogged,
                                             'border border-brand-purple text-brand-purple font-bold': !day.empty && day.isToday && !day.isLogged,
                                             'opacity-0': day.empty
                                         }">
                                        <span x-show="!day.empty" x-text="day.dayNumber"></span>
                                        <i x-show="day.isLogged" class="fa-solid fa-seedling absolute bottom-0.5 right-0.5 text-[8px] opacity-60"></i>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Wishing Well -->
                    <template x-if="quest.total_target_days">
                        <div class="glass-panel p-5 rounded-3xl border border-brand-purple/30 bg-gradient-to-br from-brand-purple/10 to-transparent relative overflow-hidden">
                            <div class="absolute -right-4 -top-4 text-6xl opacity-10 text-brand-purple"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                            <h3 class="font-bold text-brand-purple mb-2"><i class="fa-solid fa-moon mr-2"></i>我的許願池</h3>
                            <p class="text-sm text-white/80 mb-4" x-text="'期望獲得 ' + quest.wish_target + ' 朵紫花獎勵'"></p>
                            <div class="flex items-center gap-2 mb-2">
                                <div class="w-full bg-slate-800 rounded-full h-3 border border-slate-700">
                                    <div class="bg-brand-yellow h-3 rounded-full relative overflow-hidden shadow-[0_0_10px_rgba(245,158,11,0.5)] transition-all duration-500" :style="'width: ' + Math.min((quest.wish_current/quest.wish_target)*100, 100) + '%'"></div>
                                </div>
                            </div>
                            <div class="flex justify-between text-xs text-white/60">
                                <span>已集氣：<span class="text-brand-yellow font-bold" x-text="quest.wish_current"></span> 朵橘花</span>
                                <span>目標：<span x-text="quest.wish_target"></span></span>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Tab: Community (Lobby) -->
            <template x-if="currentTab === 'community'">
                <div class="space-y-5 animate-fade-in pb-10">
                    <div class="bg-brand-yellow/10 border border-brand-yellow/30 rounded-2xl p-4 flex items-center gap-4">
                        <div class="bg-brand-yellow text-slate-900 w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-[0_0_10px_rgba(245,158,11,0.6)] shrink-0">
                            <i class="fa-solid fa-hand-holding-heart"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold">散播正能量</p>
                            <p class="text-xs text-white/60">你有 <span class="text-brand-yellow font-bold" x-text="user.yellow_flowers"></span> 朵橘花可以送出。未送出將於午夜重置。</p>
                        </div>
                    </div>
                    
                    <!-- Segmented Control -->
                    <div class="flex bg-black/40 p-1 rounded-xl">
                        <button @click="communityTab = 'quests'" class="flex-1 py-2 text-sm font-bold rounded-lg transition" :class="communityTab === 'quests' ? 'bg-white/20 shadow text-white' : 'text-white/50 hover:text-white'">正在更新的專案</button>
                        <button @click="communityTab = 'wishes'" class="flex-1 py-2 text-sm font-bold rounded-lg transition" :class="communityTab === 'wishes' ? 'bg-white/20 shadow text-white' : 'text-white/50 hover:text-white'">許願池</button>
                    </div>

                    <!-- Active Quests List -->
                    <template x-if="communityTab === 'quests'">
                        <div class="space-y-4 animate-fade-in">
                            <template x-for="item in communityList" :key="item.id">
                                <div class="glass-panel p-4 rounded-2xl border border-white/5 bg-white/5 flex flex-col gap-3">
                                    <div class="flex justify-between items-center">
                                        <div class="flex items-center gap-2 cursor-pointer hover:bg-white/5 p-1 -ml-1 rounded-lg transition active:scale-95" @click="openUserProfile(item)">
                                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-400 to-purple-400 flex items-center justify-center text-xs font-bold" x-text="item.author.substring(0,1)"></div>
                                            <span class="font-semibold text-sm" x-text="item.author"></span>
                                        </div>
                                        <span class="text-xs text-white/40" x-text="'連更 ' + item.streak + ' 天'"></span>
                                    </div>
                                    <p class="text-sm text-white/80 line-clamp-2" x-text="item.content"></p>
                                    
                                    <div class="flex justify-between items-center pt-2 border-t border-white/5">
                                        <div class="flex items-center gap-1.5 text-xs text-brand-red">
                                            <i class="fa-solid fa-heart"></i>
                                            <span x-text="item.red_flowers"></span>
                                        </div>
                                        <button @click="giveFlower(item.id, $event)" :disabled="user.yellow_flowers <= 0" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all flex items-center gap-1" :class="user.yellow_flowers > 0 ? 'bg-brand-yellow text-slate-900 shadow-[0_0_10px_rgba(245,158,11,0.4)] active:scale-90' : 'bg-white/10 text-white/30 cursor-not-allowed'">
                                            <i class="fa-solid fa-seedling"></i> 送花
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    
                    <!-- Wishing Wells List -->
                    <template x-if="communityTab === 'wishes'">
                        <div class="space-y-4 animate-fade-in">
                            <template x-for="item in wishList" :key="item.id">
                                <div class="glass-panel p-4 rounded-2xl border border-brand-purple/30 bg-gradient-to-br from-brand-purple/5 to-transparent relative overflow-hidden">
                                    <div class="flex justify-between items-start mb-2">
                                        <div class="cursor-pointer hover:bg-white/5 p-1 -ml-1 rounded-lg transition active:scale-95" @click="openUserProfile(item)">
                                            <h3 class="font-bold text-brand-purple" x-text="item.title"></h3>
                                            <span class="text-xs text-white/60" x-text="'by ' + item.author"></span>
                                        </div>
                                    </div>
                                    
                                    <div class="mb-3 mt-2">
                                        <div class="w-full bg-slate-800 rounded-full h-2 border border-slate-700 mb-1">
                                            <div class="bg-brand-yellow h-2 rounded-full relative overflow-hidden shadow-[0_0_5px_rgba(245,158,11,0.5)] transition-all" :style="'width: ' + Math.min((item.current/item.target)*100, 100) + '%'"></div>
                                        </div>
                                        <div class="flex justify-between text-[10px] text-white/50">
                                            <span>已集氣：<span class="text-brand-yellow" x-text="item.current"></span></span>
                                            <span x-text="'目標：' + item.target"></span>
                                        </div>
                                    </div>
                                    
                                    <button @click="pledgeWish(item.id, $event)" :disabled="user.yellow_flowers <= 0" class="w-full py-2 mt-1 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1 border border-brand-purple/50 text-brand-purple" :class="user.yellow_flowers > 0 ? 'hover:bg-brand-purple hover:text-white active:scale-95' : 'opacity-50 cursor-not-allowed'">
                                        <i class="fa-solid fa-wand-magic-sparkles"></i> 投入橘花集氣
                                    </button>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
            
            <!-- Tab: Admin (Settings) -->
            <template x-if="currentTab === 'admin'">
                <div class="space-y-4 animate-fade-in">
                    <div class="text-center py-6 border-b border-white/10">
                        <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-r from-blue-500 to-purple-500 mb-3 flex items-center justify-center text-2xl font-bold shadow-lg">M</div>
                        <h2 class="font-bold text-xl">Max.Yuo</h2>
                        <p class="text-sm text-white/50">會員等級：管理員 (Admin)</p>
                    </div>
                    
                    <div class="bg-white/5 rounded-2xl overflow-hidden divide-y divide-white/5 border border-white/5">
                        <button class="w-full text-left p-4 flex justify-between items-center text-sm hover:bg-white/10 transition">
                            <span><i class="fa-solid fa-circle-half-stroke w-6 text-center text-white/50"></i> 主題設定</span>
                            <i class="fa-solid fa-chevron-right text-white/30"></i>
                        </button>
                        <button class="w-full text-left p-4 flex justify-between items-center text-sm hover:bg-white/10 transition">
                            <span><i class="fa-solid fa-bell w-6 text-center text-white/50"></i> 提醒設定</span>
                            <i class="fa-solid fa-chevron-right text-white/30"></i>
                        </button>
                        <button @click="resetData()" class="w-full text-left p-4 flex justify-between items-center text-sm hover:bg-white/10 transition text-red-400">
                            <span><i class="fa-solid fa-rotate-right w-6 text-center"></i> 重置測試資料</span>
                        </button>
                    </div>

                    <div class="bg-red-500/10 border border-red-500/30 rounded-2xl overflow-hidden divide-y divide-white/5 mt-4">
                        <div class="p-4 text-xs text-red-400 font-bold uppercase tracking-wider flex items-center gap-2">
                            <i class="fa-solid fa-lock"></i> 後台管理系統
                        </div>
                        <button class="w-full text-left p-4 flex justify-between items-center text-sm hover:bg-white/10 transition">
                            <span>會員名單管理</span>
                            <i class="fa-solid fa-chevron-right text-white/30"></i>
                        </button>
                        <button class="w-full text-left p-4 flex justify-between items-center text-sm hover:bg-white/10 transition">
                            <span>全站數據儀表板</span>
                            <i class="fa-solid fa-chevron-right text-white/30"></i>
                        </button>
                        <button class="w-full text-left p-4 flex justify-between items-center text-sm hover:bg-white/10 transition">
                            <span>系統參數調整 (每日橘花發放量)</span>
                            <i class="fa-solid fa-chevron-right text-white/30"></i>
                        </button>
                    </div>
                </div>
            </template>

        </main>

        <!-- Bottom Navigation Bar (iOS style) -->
        <nav class="absolute bottom-0 w-full bg-slate-900/80 backdrop-blur-xl border-t border-white/10 pb-6 pt-3 px-6 z-20">
            <div class="flex justify-between items-center">
                <button @click="currentTab = 'home'" class="flex flex-col items-center gap-1.5 w-16 transition-colors" :class="currentTab === 'home' ? 'text-white' : 'text-white/40'">
                    <i class="fa-solid fa-house text-xl mb-0.5 transition-transform" :class="currentTab === 'home' ? 'scale-110' : ''"></i>
                    <span class="text-[10px] font-medium">花園</span>
                </button>
                <button @click="currentTab = 'quest'" class="flex flex-col items-center gap-1.5 w-16 transition-colors" :class="currentTab === 'quest' ? 'text-brand-purple' : 'text-white/40'">
                    <i class="fa-solid fa-pen-nib text-xl mb-0.5 transition-transform" :class="currentTab === 'quest' ? 'scale-110' : ''"></i>
                    <span class="text-[10px] font-medium">紀錄</span>
                </button>
                <button @click="currentTab = 'community'" class="flex flex-col items-center gap-1.5 w-16 transition-colors relative" :class="currentTab === 'community' ? 'text-brand-yellow' : 'text-white/40'">
                    <!-- Indicator dot -->
                    <div x-show="user.yellow_flowers > 0" class="absolute top-0 right-2 w-2 h-2 bg-brand-yellow rounded-full animate-ping"></div>
                    <div x-show="user.yellow_flowers > 0" class="absolute top-0 right-2 w-2 h-2 bg-brand-yellow rounded-full"></div>
                    <i class="fa-solid fa-earth-asia text-xl mb-0.5 transition-transform" :class="currentTab === 'community' ? 'scale-110' : ''"></i>
                    <span class="text-[10px] font-medium">社群</span>
                </button>
                <button @click="currentTab = 'admin'" class="flex flex-col items-center gap-1.5 w-16 transition-colors" :class="currentTab === 'admin' ? 'text-white' : 'text-white/40'">
                    <i class="fa-solid fa-user text-xl mb-0.5 transition-transform" :class="currentTab === 'admin' ? 'scale-110' : ''"></i>
                    <span class="text-[10px] font-medium">我的</span>
                </button>
            </div>
        </nav>

        <!-- Create Quest Modal (Overlays full screen) -->
        <template x-if="showCreateQuestModal">
            <div class="absolute inset-0 z-50 bg-brand-dark/95 backdrop-blur-md flex flex-col p-6 animate-fade-in pt-12">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-bold">建立新專案</h2>
                    <button @click="showCreateQuestModal = false" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white/50 active:scale-90 transition">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                
                <div class="space-y-6 flex-1 overflow-y-auto scrollbar-hide pb-20">
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-white/80">專案名稱</label>
                        <input x-model="newQuest.title" type="text" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:border-brand-purple/50 transition" placeholder="例如：百日寫作計畫">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-white/80">目標長度 (最少 21 天)</label>
                        <div class="flex gap-2 mb-2">
                            <button @click="newQuest.durationType = 'DAYS'" :class="newQuest.durationType === 'DAYS' ? 'bg-brand-purple text-white border-brand-purple' : 'bg-transparent text-white/60 border-white/20'" class="flex-1 py-2 rounded-lg border text-sm font-medium transition">天</button>
                            <button @click="newQuest.durationType = 'WEEKS'" :class="newQuest.durationType === 'WEEKS' ? 'bg-brand-purple text-white border-brand-purple' : 'bg-transparent text-white/60 border-white/20'" class="flex-1 py-2 rounded-lg border text-sm font-medium transition">週</button>
                            <button @click="newQuest.durationType = 'MONTHS'" :class="newQuest.durationType === 'MONTHS' ? 'bg-brand-purple text-white border-brand-purple' : 'bg-transparent text-white/60 border-white/20'" class="flex-1 py-2 rounded-lg border text-sm font-medium transition">月</button>
                        </div>
                        <input x-model.number="newQuest.durationValue" type="number" min="1" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:border-brand-purple/50 transition" placeholder="輸入數值...">
                        <p class="text-xs text-brand-red mt-2" x-show="calculateTotalDays(newQuest) < 21">
                            <i class="fa-solid fa-circle-exclamation"></i> 系統換算為 <span x-text="calculateTotalDays(newQuest)"></span> 天。為確保習慣養成，專案長度必須至少 21 天。
                        </p>
                        <p class="text-xs text-white/50 mt-2" x-show="calculateTotalDays(newQuest) >= 21">
                            系統換算為：總計 <span class="text-brand-purple font-bold" x-text="calculateTotalDays(newQuest)"></span> 天
                        </p>
                    </div>

                    <div class="bg-brand-purple/10 border border-brand-purple/30 p-4 rounded-xl">
                        <label class="block text-sm font-semibold mb-2 text-brand-purple"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i>設定許願池目標</label>
                        <p class="text-xs text-white/60 mb-3">當達成目標時，期望能獲得多少朵紫花？大家會將橘花投入池中為你集氣！</p>
                        <input x-model.number="newQuest.wishTarget" type="number" min="10" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:border-brand-purple/50 transition" placeholder="例如：100">
                    </div>
                </div>

                <div class="pt-4 border-t border-white/10 mt-auto">
                    <button @click="createQuest()" :disabled="!newQuest.title || calculateTotalDays(newQuest) < 21 || !newQuest.wishTarget" class="w-full py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed" :class="!newQuest.title || calculateTotalDays(newQuest) < 21 || !newQuest.wishTarget ? 'bg-white/10 text-white/30' : 'bg-gradient-to-r from-brand-purple to-indigo-500 text-white'">
                        建立專案
                    </button>
                </div>
            </div>
        </template>
        
        <!-- User Profile Modal -->
        <template x-if="showUserModal">
            <div class="absolute inset-0 z-50 bg-brand-dark/95 backdrop-blur-md flex flex-col p-6 animate-fade-in pt-20 justify-center items-center">
                <div class="w-full max-w-sm glass-panel p-6 rounded-3xl border border-white/20 bg-white/10 relative shadow-2xl">
                    <button @click="showUserModal = false" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white/50 active:scale-90 transition">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    
                    <div class="text-center mb-6 mt-2">
                        <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-br from-indigo-400 to-purple-400 flex items-center justify-center text-3xl font-bold shadow-lg mb-3" x-text="selectedUser.name.substring(0,1)"></div>
                        <h2 class="text-xl font-bold mb-1" x-text="selectedUser.name"></h2>
                        <p class="text-sm text-white/70 italic" x-text="selectedUser.bio"></p>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="bg-black/30 rounded-2xl p-3 text-center border border-white/5">
                            <div class="text-2xl text-brand-yellow drop-shadow-[0_0_8px_rgba(245,158,11,0.6)] mb-1"><i class="fa-solid fa-seedling"></i></div>
                            <div class="font-bold text-lg" x-text="selectedUser.yellow"></div>
                            <div class="text-[10px] text-white/50">橘花 (今日)</div>
                        </div>
                        <div class="bg-black/30 rounded-2xl p-3 text-center border border-white/5">
                            <div class="text-2xl text-brand-red drop-shadow-[0_0_8px_rgba(239,68,68,0.6)] mb-1"><i class="fa-solid fa-heart"></i></div>
                            <div class="font-bold text-lg" x-text="selectedUser.red"></div>
                            <div class="text-[10px] text-white/50">紅花</div>
                        </div>
                        <div class="bg-black/30 rounded-2xl p-3 text-center border border-white/5">
                            <div class="text-2xl text-brand-purple drop-shadow-[0_0_8px_rgba(168,85,247,0.6)] mb-1"><i class="fa-solid fa-star"></i></div>
                            <div class="font-bold text-lg" x-text="selectedUser.purple"></div>
                            <div class="text-[10px] text-white/50">紫花</div>
                        </div>
                    </div>
                </div>
            </div>
        </template>
        
        <!-- Flower Animation Container (For sending flowers) -->
        <div id="fx-container" class="absolute inset-0 pointer-events-none z-[100] overflow-hidden"></div>
        
        <!-- Toast Notification -->
        <div x-show="toast.show" x-transition.opacity class="absolute top-20 left-1/2 transform -translate-x-1/2 z-[110] bg-white/90 text-slate-900 px-4 py-2 rounded-full shadow-lg font-bold text-sm whitespace-nowrap" x-text="toast.message">
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
